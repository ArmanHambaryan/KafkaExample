server:
  port: 8080

eureka:
  client:
    enabled: false 

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<remaining>.*), /$\{remaining}

        - id: kitchen-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/kitchen/**
          filters:
            - RewritePath=/api/kitchen/(?<remaining>.*), /$\{remaining}

        - id: waiter-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/waiter/**
          filters:
            - RewritePath=/api/waiter/(?<remaining>.*), /$\{remaining}